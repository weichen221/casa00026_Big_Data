<svg width="100%" viewBox="0 0 680 420" role="img" xmlns="http://www.w3.org/2000/svg">
  <title>Reburn susceptibility model methodology</title>
  <desc>Four predictor groups and ICNF response variable feed into Random Forest</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="8" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.5" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>
  <text x="175" y="18" text-anchor="middle" dominant-baseline="central" font-size="11" fill="#888780" font-style="italic">Predictors (8 variables)</text>
  <rect x="20" y="30" width="155" height="24" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="97" y="42" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#633806">Legacy effects</text>
  <rect x="20" y="60" width="155" height="24" rx="4" fill="#FAC775" stroke="#854F0B" stroke-width="0.5"/>
  <text x="97" y="72" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#412402">dNBR 2017</text>
  <rect x="20" y="106" width="155" height="24" rx="6" fill="#E1F5EE" stroke="#0F6E56" stroke-width="0.8"/>
  <text x="97" y="118" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#085041">Ecological recovery</text>
  <rect x="20" y="136" width="155" height="24" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="97" y="148" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C">NBR slope 2018–2020</text>
  <rect x="20" y="166" width="155" height="24" rx="4" fill="#9FE1CB" stroke="#0F6E56" stroke-width="0.5"/>
  <text x="97" y="178" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#04342C">NBR offset</text>
  <rect x="20" y="212" width="155" height="24" rx="6" fill="#E6F1FB" stroke="#185FA5" stroke-width="0.8"/>
  <text x="97" y="224" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#0C447C">Current fuel state</text>
  <rect x="20" y="242" width="155" height="24" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="97" y="254" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#042C53">NDVI 2025</text>
  <rect x="20" y="272" width="155" height="24" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="97" y="284" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#042C53">NDMI min 2025</text>
  <rect x="20" y="302" width="155" height="24" rx="4" fill="#85B7EB" stroke="#185FA5" stroke-width="0.5"/>
  <text x="97" y="314" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#042C53">LST max 2025</text>
  <rect x="195" y="30" width="155" height="24" rx="6" fill="#EEEDFE" stroke="#534AB7" stroke-width="0.8"/>
  <text x="272" y="42" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#3C3489">Topographic control</text>
  <rect x="195" y="60" width="155" height="24" rx="4" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text x="272" y="72" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#26215C">Elevation</text>
  <rect x="195" y="90" width="155" height="24" rx="4" fill="#AFA9EC" stroke="#534AB7" stroke-width="0.5"/>
  <text x="272" y="102" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#26215C">Aspect</text>
  <path d="M175 72 L390 195" fill="none" stroke="#BA7517" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M175 155 L390 200" fill="none" stroke="#1D9E75" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M175 275 L390 215" fill="none" stroke="#378ADD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M350 72 L390 193" fill="none" stroke="#7F77DD" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="390" y="168" width="155" height="65" rx="10" fill="#EEEDFE" stroke="#534AB7" stroke-width="1.2"/>
  <text x="467" y="188" text-anchor="middle" dominant-baseline="central" font-size="12" font-weight="500" fill="#3C3489">Random Forest</text>
  <text x="467" y="206" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7">100 trees</text>
  <text x="467" y="222" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#534AB7">spatial holdout</text>
  <rect x="195" y="358" width="155" height="24" rx="6" fill="#FAECE7" stroke="#993C1D" stroke-width="0.8"/>
  <text x="272" y="370" text-anchor="middle" dominant-baseline="central" font-size="11" font-weight="500" fill="#712B13">Response variable</text>
  <rect x="195" y="388" width="155" height="24" rx="4" fill="#F5C4B3" stroke="#993C1D" stroke-width="0.5"/>
  <text x="272" y="400" text-anchor="middle" dominant-baseline="central" font-size="10" fill="#4A1B0C">ICNF reburn labels 2018–2025</text>
  <path d="M350 370 L390 233" fill="none" stroke="#993C1D" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M545 185 L580 155" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <path d="M545 215 L580 245" fill="none" stroke="#888780" stroke-width="1.2" marker-end="url(#arrow)"/>
  <rect x="580" y="120" width="88" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="624" y="138" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#633806">Reburn</text>
  <text x="624" y="152" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#633806">probability</text>
  <rect x="580" y="220" width="88" height="50" rx="6" fill="#FAEEDA" stroke="#854F0B" stroke-width="0.8"/>
  <text x="624" y="238" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#633806">5-class</text>
  <text x="624" y="253" text-anchor="middle" dominant-baseline="central" font-size="10" font-weight="500" fill="#633806">map</text>
</svg>