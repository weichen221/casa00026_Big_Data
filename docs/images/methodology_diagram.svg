<svg width="100%" viewBox="0 0 720 440" role="img" xmlns="http://www.w3.org/2000/svg" font-family="Georgia, 'Times New Roman', serif">
  <title>Reburn susceptibility model methodology</title>
  <desc>Eight predictors organised in four groups and the ICNF response variable feed into a Random Forest classifier producing a reburn probability surface and a 5-class susceptibility map.</desc>
  <defs>
    <marker id="arrow" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M2 1L8 5L2 9" fill="none" stroke="context-stroke" stroke-width="1.4" stroke-linecap="round" stroke-linejoin="round"/>
    </marker>
  </defs>

  <text x="20" y="22" font-size="11" font-style="italic" fill="#444">Predictors (8 variables)</text>

  <rect x="20" y="36" width="170" height="22" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="0.9"/>
  <text x="105" y="51" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Legacy effects</text>
  <rect x="20" y="62" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="77" text-anchor="middle" font-size="10" fill="#222">dNBR 2017</text>

  <rect x="20" y="100" width="170" height="22" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="0.9"/>
  <text x="105" y="115" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Ecological recovery</text>
  <rect x="20" y="126" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="141" text-anchor="middle" font-size="10" fill="#222">NBR slope 2018-2020</text>
  <rect x="20" y="152" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="167" text-anchor="middle" font-size="10" fill="#222">NBR offset</text>

  <rect x="20" y="190" width="170" height="22" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="0.9"/>
  <text x="105" y="205" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Current fuel state</text>
  <rect x="20" y="216" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="231" text-anchor="middle" font-size="10" fill="#222">NDVI 2025</text>
  <rect x="20" y="242" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="257" text-anchor="middle" font-size="10" fill="#222">NDMI min 2025</text>
  <rect x="20" y="268" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="283" text-anchor="middle" font-size="10" fill="#222">LST max 2025</text>

  <rect x="20" y="306" width="170" height="22" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="0.9"/>
  <text x="105" y="321" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Topographic control</text>
  <rect x="20" y="332" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="347" text-anchor="middle" font-size="10" fill="#222">Elevation</text>
  <rect x="20" y="358" width="170" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="105" y="373" text-anchor="middle" font-size="10" fill="#222">Aspect</text>

  <rect x="280" y="395" width="200" height="22" rx="2" fill="#f5f5f5" stroke="#333" stroke-width="0.9"/>
  <text x="380" y="410" text-anchor="middle" font-size="11" font-weight="bold" fill="#111">Response variable</text>
  <rect x="280" y="368" width="200" height="22" rx="2" fill="#ffffff" stroke="#888" stroke-width="0.6"/>
  <text x="380" y="383" text-anchor="middle" font-size="10" fill="#222">ICNF reburn labels 2018-2025</text>

  <path d="M190 73 L420 195" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>
  <path d="M190 140 L420 200" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>
  <path d="M190 240 L420 215" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>
  <path d="M190 345 L420 220" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>
  <path d="M380 368 L460 235" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>

  <rect x="420" y="180" width="170" height="60" rx="2" fill="#ffffff" stroke="#111" stroke-width="1.6"/>
  <text x="505" y="200" text-anchor="middle" font-size="12" font-weight="bold" fill="#111">Random Forest</text>
  <text x="505" y="216" text-anchor="middle" font-size="10" fill="#333">100 trees, minLeaf 10</text>
  <text x="505" y="230" text-anchor="middle" font-size="10" fill="#333">spatial holdout</text>

  <path d="M590 195 L640 145" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>
  <path d="M590 225 L640 275" fill="none" stroke="#666" stroke-width="0.9" marker-end="url(#arrow)"/>

  <rect x="620" y="110" width="80" height="46" rx="2" fill="#ffffff" stroke="#333" stroke-width="0.9"/>
  <text x="660" y="128" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">Reburn</text>
  <text x="660" y="142" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">probability</text>

  <rect x="620" y="260" width="80" height="46" rx="2" fill="#ffffff" stroke="#333" stroke-width="0.9"/>
  <text x="660" y="278" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">5-class</text>
  <text x="660" y="292" text-anchor="middle" font-size="10" font-weight="bold" fill="#111">map</text>
</svg>
